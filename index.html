<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dualhook Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

#result{
    margin-top:15px;
    font-weight:bold;
    color:#4ade80;
}
</style>
</head>

<body>

<div class="container">
    <h2>Enter IP</h2>

    <input type="text" id="ipbox" placeholder="Type IP here">

    <button onclick="dualhook()">DUALHOOK!</button>

    <div id="result"></div>
</div>

<script>
function dualhook(){
    document.getElementById("result").innerText =
    "Successfully dualhooked";
}
</script>

</body>
</html>
