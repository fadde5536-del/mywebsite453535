<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Scanner</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#7b3cff,#ff4fd8);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  position:relative;
  background:white;
  padding:30px;
  border-radius:25px;
  width:90%;
  max-width:500px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
  animation:floatIn 0.9s ease;
  transition:transform .3s;
}

.container:hover{
  transform:translateY(-5px);
}

h2{
  margin-bottom:15px;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.inputGroup{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.inputGroup input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:2px solid #eee;
  font-size:16px;
  transition:border .3s, box-shadow .3s;
}

.inputGroup input:focus{
  border-color:#ff4fd8;
  box-shadow:0 0 10px rgba(255,79,216,0.5);
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

#terminal{
  margin-top:20px;
  text-align:left;
  font-family:monospace;
  font-size:14px;
  line-height:1.6;
  color:#333;
  min-height:80px;
}

.progress{
  margin-top:15px;
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  transition:width .6s ease;
}

@keyframes floatIn{
  from{
    opacity:0;
    transform:translateY(20px) scale(.95);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.onlyFor{
  position:absolute;
  top:10px;
  right:15px;
  font-size:14px;
  color:#ff4fd8;
  font-weight:bold;
}

.typingCursor{
  display:inline-block;
  width:8px;
  background:#ff4fd8;
  margin-left:3px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>
<body>

<div class="container">

<div class="onlyFor">Only for Luke & Irene ❤️</div>

<h2>Network Scanner</h2>

<div class="inputGroup">
  <input id="nameInput" type="text" placeholder="Enter name">
  <input id="customIP" type="text" placeholder="Enter IP (some work mostly all work)">
</div>

<button onclick="startScan()">Scan</button>

<div id="terminal"></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

</div>

<script>
// Generate deterministic IP from name
function nameToIP(name){
  let hash=0
  for(let i=0;i<name.length;i++){
    hash=name.charCodeAt(i)+((hash<<5)-hash)
  }
  let ip=[
    (hash>>24)&255,
    (hash>>16)&255,
    (hash>>8)&255,
    hash&255
  ].map(n=>Math.abs(n)%256)
  return ip.join(".")
}

// Typing animation
function typeText(text, delay){
  let terminal=document.getElementById("terminal")
  setTimeout(()=>{
    let line=document.createElement("div")
    terminal.appendChild(line)
    let i=0
    let interval=setInterval(()=>{
      line.textContent+=text[i]
      i++
      if(i>=text.length){
        clearInterval(interval)
      }
    },20)
  },delay)
}

function startScan(){
  let name=document.getElementById("nameInput").value.trim()
  let customIP=document.getElementById("customIP").value.trim()
  let terminal=document.getElementById("terminal")
  let bar=document.getElementById("bar")

  terminal.innerHTML=""
  bar.style.width="0%"

  if(name===""){
    terminal.innerHTML="Enter a name first."
    return
  }

  let ip = customIP || nameToIP(name)

  typeText("Searching database for "+name+"...",0)

  setTimeout(()=>{
    bar.style.width="25%"
    typeText("IP located: "+ip,200)
  },1200)

  setTimeout(()=>{
    bar.style.width="50%"
    typeText("Connecting to phone number...",200)
  },2600)

  setTimeout(()=>{
    bar.style.width="75%"
    typeText("Establishing encrypted tunnel...",200)
  },4200)

  setTimeout(()=>{
    bar.style.width="100%"
    typeText("DUALHOOKED!",200)
  },5600)
}
</script>

</body>
</html>
