<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Scanner</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#6b3df5,#9b5cff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:25px;
width:90%;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
animation:floatIn 0.8s ease;
transition:transform .3s;
}

.container:hover{
transform:translateY(-4px);
}

h2{
margin-bottom:15px;
color:#6b3df5;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #eee;
margin-top:10px;
font-size:16px;
transition:border .3s, box-shadow .3s;
}

input:focus{
border-color:#8a63ff;
box-shadow:0 0 8px rgba(138,99,255,0.5);
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#7b4dff;
color:white;
font-size:16px;
cursor:pointer;
transition:transform .2s, box-shadow .2s, background .3s;
}

button:hover{
background:#6a3cff;
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

#terminal{
margin-top:20px;
text-align:left;
font-family:monospace;
font-size:14px;
line-height:1.6;
color:#333;
min-height:80px;
}

.progress{
margin-top:15px;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#7b4dff,#b07cff);
transition:width .6s ease;
}

@keyframes floatIn{
from{
opacity:0;
transform:translateY(20px) scale(.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.typing{
border-right:2px solid #7b4dff;
animation:blink .8s infinite;
}

@keyframes blink{
50%{border-color:transparent;}
}

</style>
</head>

<body>

<div class="container">

<h2>Network Scanner</h2>

<input id="nameInput" type="text" placeholder="Enter name">

<button onclick="startScan()">Scan</button>

<div id="terminal"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

function nameToIP(name){
let hash=0
for(let i=0;i<name.length;i++){
hash=name.charCodeAt(i)+((hash<<5)-hash)
}

let ip=[
(hash>>24)&255,
(hash>>16)&255,
(hash>>8)&255,
hash&255
].map(n=>Math.abs(n)%256)

return ip.join(".")
}

function typeLine(text,delay){
let terminal=document.getElementById("terminal")

setTimeout(()=>{
let line=document.createElement("div")
line.textContent=text
terminal.appendChild(line)
terminal.scrollTop=terminal.scrollHeight
},delay)

}

function startScan(){

let name=document.getElementById("nameInput").value.trim()
let terminal=document.getElementById("terminal")
let bar=document.getElementById("bar")

terminal.innerHTML=""
bar.style.width="0%"

if(name===""){
terminal.innerHTML="Enter a name first."
return
}

let ip=nameToIP(name)

typeLine("Searching database for "+name+"...",0)

setTimeout(()=>{
bar.style.width="25%"
typeLine("IP located: "+ip,100)
},1200)

setTimeout(()=>{
bar.style.width="50%"
typeLine("Connecting to phone number...",100)
},2600)

setTimeout(()=>{
bar.style.width="75%"
typeLine("Establishing encrypted tunnel...",100)
},4000)

setTimeout(()=>{
bar.style.width="100%"
typeLine("DUALHOOKED!",100)
},5400)

}

</script>

</body>
</html>
