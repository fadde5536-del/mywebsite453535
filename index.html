<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Scanner</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
animation:fadeIn 0.8s ease;
}

h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 10px rgba(0,0,0,0.15);
}

#terminal{
margin-top:20px;
text-align:left;
font-family:monospace;
font-size:14px;
color:#333;
line-height:1.6;
}

.progress{
margin-top:15px;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#4CAF50;
transition:width 0.6s ease;
}

.fadeLine{
opacity:0;
animation:fadeLine 0.6s forwards;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes fadeLine{
to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h2>Network Scanner</h2>

<input id="nameInput" type="text" placeholder="Enter name">

<button onclick="startScan()">Scan</button>

<div id="terminal"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

function randomIP(){
return Math.floor(Math.random()*256)+"."+
Math.floor(Math.random()*256)+"."+
Math.floor(Math.random()*256)+"."+
Math.floor(Math.random()*256);
}

function addLine(text){
let terminal = document.getElementById("terminal")
let line = document.createElement("div")
line.className="fadeLine"
line.innerHTML=text
terminal.appendChild(line)
}

function startScan(){

let name=document.getElementById("nameInput").value
let bar=document.getElementById("bar")
let terminal=document.getElementById("terminal")

terminal.innerHTML=""
bar.style.width="0%"

let ip=randomIP()

addLine("Searching database for "+name+"...")

setTimeout(()=>{
addLine("IP located: "+ip)
bar.style.width="25%"
},1500)

setTimeout(()=>{
addLine("Connecting to phone number...")
bar.style.width="50%"
},3000)

setTimeout(()=>{
addLine("Establishing connection...")
bar.style.width="75%"
},4500)

setTimeout(()=>{
addLine("<b>DUALHOOKED!</b>")
bar.style.width="100%"
},6000)

}

</script>

</body>
</html>
