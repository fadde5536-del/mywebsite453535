<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Full Screen Neon Glass Menu</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0;
    height: 100%;
    background: #1a0a4f;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    perspective: 1000px;
  }

  /* Bubbles container */
  #bubbleContainer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }

  /* Individual bubble style */
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    background: linear-gradient(135deg, #ff4fd8, #7b3cff);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% {
      transform: translateY(100vh) translateX(0) scale(0);
    }
    50% {
      opacity: 0.6;
    }
    100% {
      transform: translateY(-10vh) translateX(50px) scale(1);
    }
  }

  /* Full screen glass container with neon border */
  .container {
    position: relative;
    width: 90vw;
    max-width: 900px;
    height: 90vh;
    border-radius: 25px;
    padding: 40px 60px;
    background: rgba(255 255 255 / 0.1);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px) saturate(180%);
    box-shadow:
      0 0 20px #7b3cff88,
      0 0 25px #ff4fd888,
      inset 0 0 50px #7b3cff55,
      inset 0 0 30px #ff4fd855;
    color: white;
    text-align: center;
    z-index: 10;
    border-radius: 25px;
    cursor: default;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  /* Neon border animated with background-clip */
  .container::before {
    content: '';
    position: absolute;
    top: -3px; left: -3px; right: -3px; bottom: -3px;
    border-radius: 28px;
    padding: 3px;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
    background-size: 400% 400%;
    animation: neonShift 10s linear infinite;
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes neonShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Header */
  h2 {
    margin-bottom: 25px;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 2.4rem;
  }

  /* Inputs container */
  .inputGroup {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  /* Input style */
  .inputGroup input {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: rgba(255 255 255 / 0.15);
    color: white;
    font-size: 18px;
  }
  .inputGroup input::placeholder {
    color: rgba(255 255 255 / 0.7);
  }

  /* Button */
  button {
    width: 100%;
    margin-top: 25px;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    color: white;
    font-size: 18px;
    cursor: pointer;
    user-select: none;
  }

  /* Terminal output */
  #terminal {
    margin-top: 30px;
    font-family: monospace;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100px;
    flex-grow: 1;
    overflow-y: auto;
    text-align: left;
  }

  /* Progress bar background */
  .progress {
    margin-top: 20px;
    height: 14px;
    background: rgba(255 255 255 / 0.2);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
  }

  /* Progress bar fill */
  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    transition: width 0.6s ease;
  }

  /* "Only for Luke & Irene" text */
  .onlyFor {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 16px;
    color: #ff4fd8;
    font-weight: bold;
    user-select: none;
  }

  /* Scrollbar for terminal */
  #terminal::-webkit-scrollbar {
    width: 8px;
  }
  #terminal::-webkit-scrollbar-thumb {
    background: #7b3cff88;
    border-radius: 4px;
  }
  #terminal::-webkit-scrollbar-track {
    background: transparent;
  }
</style>
</head>
<body>

<div id="bubbleContainer"></div>

<div class="container" id="menu">
  <div class="onlyFor">Only for Luke & Irene ❤️</div>
  <h2>Network Scanner</h2>
  <div class="inputGroup">
    <input id="nameInput" type="text" placeholder="Enter name" />
    <input id="customIP" type="text" placeholder="Enter IP" />
  </div>
  <button onclick="startScan()">Scan</button>
  <div id="terminal"></div>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script>
  // Create floating bubbles
  const bubbleContainer = document.getElementById("bubbleContainer");
  for (let i = 0; i < 20; i++) {
    const b = document.createElement("div");
    b.className = "bubble";
    const size = Math.random() * 80 + 40;
    b.style.width = size + "px";
    b.style.height = size + "px";
    b.style.left = Math.random() * 100 + "vw";
    b.style.animationDuration = 8 + Math.random() * 5 + "s";
    b.style.animationDelay = Math.random() * 5 + "s";
    bubbleContainer.appendChild(b);
  }

  // Menu follows cursor movement
  const menu = document.getElementById("menu");
  document.addEventListener("mousemove", (e) => {
    const x = (e.clientX - window.innerWidth / 2) / 40;
    const y = (e.clientY - window.innerHeight / 2) / 40;
    menu.style.transform = `translate3d(${x}px, ${y}px, 0)`;
  });

  // Generate deterministic IP from name
  function nameToIP(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = name.charCodeAt(i) + (hash << 5) - hash;
    }
    const ip = [
      (hash >> 24) & 255,
      (hash >> 16) & 255,
      (hash >> 8) & 255,
      hash & 255,
    ].map((n) => Math.abs(n) % 256);
    return ip.join(".");
  }

  // Typing effect for terminal output
  function typeText(text, delay) {
    const terminal = document.getElementById("terminal");
    setTimeout(() => {
      const line = document.createElement("div");
      terminal.appendChild(line);
      let i = 0;
      const interval = setInterval(() => {
        line.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 20);
    }, delay);
  }

  // Start fake scan
  function startScan() {
    const name = document.getElementById("nameInput").value.trim();
    const customIP = document.getElementById("customIP").value.trim();
    const terminal = document.getElementById("terminal");
    const bar = document.getElementById("bar");

    terminal.innerHTML = "";
    bar.style.width = "0%";

    if (name === "") {
      terminal.innerHTML = "Enter a name first.";
      return;
    }

    const ip = customIP || nameToIP(name);

    typeText(`Searching database for ${name}...`, 0);
    setTimeout(() => {
      bar.style.width = "25%";
      typeText(`IP located: ${ip}`, 200);
    }, 1200);
    setTimeout(() => {
      bar.style.width = "50%";
      typeText("Connecting to phone number...", 200);
    }, 2600);
    setTimeout(() => {
      bar.style.width = "75%";
      typeText("Establishing encrypted tunnel...", 200);
    }, 4200);
    setTimeout(() => {
      bar.style.width = "100%";
      typeText("DUALHOOKED!", 200);
    }, 5600);
  }
</script>

</body>
</html>
