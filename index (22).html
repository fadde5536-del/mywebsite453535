<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Glass Menu</title>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:#7b3cff;
  perspective:1200px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
}

/* Floating big bubbles */
.bubble{
  position:absolute;
  border-radius:50%;
  opacity:0.3;
  background:linear-gradient(135deg,#ff4fd8,#7b3cff);
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  0% {transform: translateY(100vh) translateX(0) scale(0);}
  50% {opacity:0.7;}
  100% {transform: translateY(-10vh) translateX(50px) scale(1);}
}

/* Glass menu with 3D sides visible */
.container{
  width: 400px;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 30px 60px rgba(0,0,0,0.25);
  transform: rotateY(-12deg) rotateX(5deg);
  transition: transform 0.3s ease;
  color: white;
  text-align: center;
}

.container:hover{
  transform: rotateY(0deg) rotateX(0deg);
}

h2{
  margin-bottom:15px;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.inputGroup{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.inputGroup input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.2);
  color:white;
  font-size:16px;
}

.inputGroup input::placeholder{
  color: rgba(255,255,255,0.7);
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  color:white;
  font-size:16px;
  cursor:pointer;
}

#terminal{
  margin-top:20px;
  font-family:monospace;
  font-size:14px;
  line-height:1.6;
  min-height:80px;
}

.progress{
  margin-top:15px;
  height:10px;
  background: rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
  width:100%;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7b3cff,#ff4fd8);
  transition:width .6s ease;
}

.onlyFor{
  position:absolute;
  top:10px;
  right:15px;
  font-size:14px;
  color:#ff4fd8;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="bubbleContainer"></div>

<div class="container">
  <div class="onlyFor">Only for Luke & Irene ❤️</div>
  <h2>Network Scanner</h2>
  <div class="inputGroup">
    <input id="nameInput" type="text" placeholder="Enter name">
    <input id="customIP" type="text" placeholder="Enter IP">
  </div>
  <button onclick="startScan()">Scan</button>
  <div id="terminal"></div>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script>
// Create big floating bubbles
const bubbleContainer = document.getElementById('bubbleContainer');
for(let i=0;i<20;i++){
  let b = document.createElement('div');
  b.className='bubble';
  let size = Math.random()*80+40;
  b.style.width = size+'px';
  b.style.height = size+'px';
  b.style.left = Math.random()*100+'vw';
  b.style.animationDuration = (8+Math.random()*5)+'s';
  b.style.animationDelay = Math.random()*5+'s';
  bubbleContainer.appendChild(b);
}

// Deterministic IP
function nameToIP(name){
  let hash=0
  for(let i=0;i<name.length;i++){
    hash=name.charCodeAt(i)+((hash<<5)-hash)
  }
  let ip=[
    (hash>>24)&255,
    (hash>>16)&255,
    (hash>>8)&255,
    hash&255
  ].map(n=>Math.abs(n)%256)
  return ip.join(".")
}

// Typing effect
function typeText(text, delay){
  let terminal=document.getElementById("terminal")
  setTimeout(()=>{
    let line=document.createElement("div")
    terminal.appendChild(line)
    let i=0
    let interval=setInterval(()=>{
      line.textContent+=text[i]
      i++
      if(i>=text.length) clearInterval(interval)
    },20)
  },delay)
}

function startScan(){
  let name=document.getElementById("nameInput").value.trim()
  let customIP=document.getElementById("customIP").value.trim()
  let terminal=document.getElementById("terminal")
  let bar=document.getElementById("bar")

  terminal.innerHTML=""
  bar.style.width="0%"

  if(name===""){
    terminal.innerHTML="Enter a name first."
    return
  }

  let ip = customIP || nameToIP(name)

  typeText("Searching database for "+name+"...",0)
  setTimeout(()=>{
    bar.style.width="25%"
    typeText("IP located: "+ip,200)
  },1200)
  setTimeout(()=>{
    bar.style.width="50%"
    typeText("Connecting to phone number...",200)
  },2600)
  setTimeout(()=>{
    bar.style.width="75%"
    typeText("Establishing encrypted tunnel...",200)
  },4200)
  setTimeout(()=>{
    bar.style.width="100%"
    typeText("DUALHOOKED!",200)
  },5600)
}
</script>

</body>
</html>
