<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fullscreen Animated Bubble Background + Neon Glass Menu</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0;
    height: 100%;
    background: #1a0a4f; /* deep purple */
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* Fullscreen bubbles container behind everything */
  #bubbleContainer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }

  /* Bubble style */
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.3;
    background: linear-gradient(135deg, #ff4fd8, #7b3cff);
    will-change: transform, opacity;
  }

  /* Neon glass menu container */
  .container {
    position: fixed; /* fixed center */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255 255 255 / 0.1);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px) saturate(180%);
    box-shadow:
      0 0 20px #7b3cff88,
      0 0 25px #ff4fd888,
      inset 0 0 50px #7b3cff55,
      inset 0 0 30px #ff4fd855;
    color: white;
    text-align: center;
    z-index: 10;
    cursor: default;
  }

  /* Neon rainbow border */
  .container::before {
    content: '';
    position: absolute;
    top: -3px; left: -3px; right: -3px; bottom: -3px;
    border-radius: 28px;
    padding: 3px;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
    background-size: 400% 400%;
    animation: neonShift 10s linear infinite;
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes neonShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Header */
  h2 {
    margin-bottom: 15px;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Inputs container */
  .inputGroup {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .inputGroup input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255 255 255 / 0.15);
    color: white;
    font-size: 16px;
  }
  .inputGroup input::placeholder {
    color: rgba(255 255 255 / 0.7);
  }

  /* Button */
  button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    color: white;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
  }

  /* Terminal output */
  #terminal {
    margin-top: 20px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 80px;
  }

  /* Progress bar background */
  .progress {
    margin-top: 15px;
    height: 10px;
    background: rgba(255 255 255 / 0.2);
    border-radius: 10px;
    overflow: hidden;
    width: 100%;
  }

  /* Progress bar fill */
  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7b3cff, #ff4fd8);
    transition: width 0.6s ease;
  }

  /* Only for Luke & Irene text */
  .onlyFor {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 14px;
    color: #ff4fd8;
    font-weight: bold;
    user-select: none;
  }
</style>
</head>
<body>

<div id="bubbleContainer"></div>

<div class="container" id="menu">
  <div class="onlyFor">Only for Luke & Irene ❤️</div>
  <h2>Network Scanner</h2>
  <div class="inputGroup">
    <input id="nameInput" type="text" placeholder="Enter name" />
    <input id="customIP" type="text" placeholder="Enter IP" />
  </div>
  <button onclick="startScan()">Scan</button>
  <div id="terminal"></div>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script>
  // Create 30 bubbles with random sizes, positions, animation speed
  const bubbleContainer = document.getElementById("bubbleContainer");
  const bubbles = [];

  for (let i = 0; i < 30; i++) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const size = Math.random() * 80 + 40; // 40px to 120px
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left = Math.random() * 100 + "vw";
    bubble.style.bottom = -size + "px"; // start below screen
    bubble.style.opacity = (0.2 + Math.random() * 0.3).toFixed(2);
    bubbleContainer.appendChild(bubble);
    bubbles.push({
      el: bubble,
      size: size,
      xBase: parseFloat(bubble.style.left),
      y: -size,
      speed: 10 + Math.random() * 10, // vertical speed px per sec
      driftAmplitude: 30 + Math.random() * 30, // horizontal drift px
      driftSpeed: 0.5 + Math.random(), // drift cycles per sec
      opacitySpeed: 1 + Math.random() * 1.5,
      scaleSpeed: 0.5 + Math.random()
    });
  }

  let lastTime = performance.now();

  function animateBubbles(time = performance.now()) {
    const dt = (time - lastTime) / 1000; // delta seconds
    lastTime = time;
    bubbles.forEach((b, i) => {
      b.y += b.speed * dt;
      if (b.y > window.innerHeight + b.size) {
        b.y = -b.size; // reset to bottom
        b.xBase = Math.random() * 100; // new horizontal start vw
      }
      const driftX = b.driftAmplitude * Math.sin(time / 1000 * b.driftSpeed * 2 * Math.PI);
      const opacity = 0.25 + 0.15 * Math.sin(time / 1000 * b.opacitySpeed * 2 * Math.PI + i);
      const scale = 0.85 + 0.3 * Math.sin(time / 1000 * b.scaleSpeed * 2 * Math.PI + i);

      b.el.style.transform = `translateX(${driftX}px) translateY(${window.innerHeight - b.y}px) scale(${scale.toFixed(2)})`;
      b.el.style.opacity = opacity.toFixed(2);
      b.el.style.left = b.xBase + "vw";
    });
    requestAnimationFrame(animateBubbles);
  }
  animateBubbles();

  // Menu follows cursor movement (small float effect)
  const menu = document.getElementById("menu");
  document.addEventListener("mousemove", (e) => {
    const x = (e.clientX - window.innerWidth / 2) / 40;
    const y = (e.clientY - window.innerHeight / 2) / 40;
    menu.style.transform = `translate3d(calc(-50% + ${x}px), calc(-50% + ${y}px), 0)`;
  });

  // Generate deterministic IP from name
  function nameToIP(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = name.charCodeAt(i) + (hash << 5) - hash;
    }
    const ip = [
      (hash >> 24) & 255,
      (hash >> 16) & 255,
      (hash >> 8) & 255,
      hash & 255,
    ].map((n) => Math.abs(n) % 256);
    return ip.join(".");
  }

  // Typing effect for terminal output
  function typeText(text, delay) {
    const terminal = document.getElementById("terminal");
    setTimeout(() => {
      const line = document.createElement("div");
      terminal.appendChild(line);
      let i = 0;
      const interval = setInterval(() => {
        line.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 20);
    }, delay);
  }

  // Start fake scan
  function startScan() {
    const name = document.getElementById("nameInput").value.trim();
    const customIP = document.getElementById("customIP").value.trim();
    const terminal = document.getElementById("terminal");
    const bar = document.getElementById("bar");

    terminal.innerHTML = "";
    bar.style.width = "0%";

    if (name === "") {
      terminal.innerHTML = "Enter a name first.";
      return;
    }

    const ip = customIP || nameToIP(name);

    typeText(`Searching database for ${name}...`, 0);
    setTimeout(() => {
      bar.style.width = "25%";
      typeText(`IP located: ${ip}`, 200);
    }, 1200);
    setTimeout(() => {
      bar.style.width = "50%";
      typeText("Connecting to phone number...", 200);
    }, 2600);
    setTimeout(() => {
      bar.style.width = "75%";
      typeText("Establishing encrypted tunnel...", 200);
    }, 4200);
    setTimeout(() => {
      bar.style.width = "100%";
      typeText("DUALHOOKED!", 200);
    }, 5600);
  }
</script>

</body>
</html>
